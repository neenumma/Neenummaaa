<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heyy 😚</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

.container{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

#lines{
  font-size:24px;
  color:white;
  transition:0.4s;
}
</style>
</head>

<body>

<div class="container" id="questionBox">
  <h2>Edi, yy nk ara aryuo? 😏💖</h2>
  <button onclick="yes()">Yes 😌</button>
  <button onclick="no()">No 😏</button>
</div>

<div id="lines"></div>

<audio id="song" src="song.mp3"></audio>

<script>

function yes(){
  document.getElementById("questionBox").innerHTML =
    "<h2>Hehe 😌❤️ Ente allee 😚💋</h2>";
}

function no(){
  document.getElementById("questionBox").style.display="none";

  const audio = document.getElementById("song");
  const lineBox = document.getElementById("lines");

  audio.play();

  audio.ontimeupdate = function(){

    let t = audio.currentTime;

    if(t >= 0 && t < 1.5){
      lineBox.innerHTML = "Kaath kittye muthannn 😚💋";
    }
    else if(t >= 1.5 && t < 4.75){
      lineBox.innerHTML = "Thedi kittya ponaane 😌❤️";
    }
    else if(t >= 4.75 && t < 9){
      lineBox.innerHTML = "Kattedthoru moha sothaneeee 😌❤️🫵🏻";
    }
    else if(t >= 9){
      lineBox.innerHTML = "Love uhhh mwaaahhh 😌💋💗";
    }

  };

}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heyy 😚</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#ffdde1,#ee9ca7);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

.container{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

button{
  margin:10px;
  padding:10px 20px;
  border:none;
  border-radius:20px;
  background:#ff4d6d;
  color:white;
}

#lines{
  font-size:24px;
  color:white;
  transition:0.4s;
}

#photoBox{
  position:absolute;
  top:20px;
  left:20px;
  width:130px;
  height:160px;
}

#photoBox img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:10px;
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
  transition:0.6s;
}

.fade{
  opacity:0;
  transform:scale(0.9);
}
</style>
</head>

<body>

<div id="photoBox">
  <img id="photo" src="photo1.jpg">
</div>

<div class="container" id="questionBox">
  <h2>Edi, yy nk ara aryuo? 😏💖</h2>
  <button onclick="yes()">Yes 😌</button>
  <button onclick="no()">No 😏</button>
</div>

<div id="lines"></div>

<audio id="song" src="song.mp3"></audio>

<script>

function yes(){
  document.getElementById("questionBox").innerHTML =
    "<h2>Hehe 😌❤️ Ente allee 😚💋</h2>";
}

function no(){
  document.getElementById("questionBox").style.display="none";

  const audio = document.getElementById("song");
  const lineBox = document.getElementById("lines");
  const photo = document.getElementById("photo");

  audio.play();

  let lastLine = -1;
  let photoIndex = 0;
  let interval;

  const photoSets = [
    ["photo1.jpg","photo2.jpg"],
    ["photo3.jpg","photo4.jpg"],
    ["photo5.jpg","photo6.jpg"],
    ["photo7.jpg","photo8.jpg"]
  ];

  function changePhoto(set){
    photo.classList.add("fade");

    setTimeout(()=>{
      photo.src = set[photoIndex % 2];
      photoIndex++;
      photo.classList.remove("fade");
    },300);
  }

  audio.ontimeupdate = function(){

    let t = audio.currentTime;

    function switchSet(index){
      if(lastLine !== index){
        lastLine = index;
        photoIndex = 0;
        clearInterval(interval);
        interval = setInterval(()=>changePhoto(photoSets[index]),1500);
      }
    }

    if(t >= 0 && t < 1.5){
      lineBox.innerHTML = "Kaath kittye muthannn 😚💋";
      switchSet(0);
    }
    else if(t >= 1.5 && t < 4.75){
      lineBox.innerHTML = "Thedi kittya ponaane 😌❤️";
      switchSet(1);
    }
    else if(t >= 4.75 && t < 9){
      lineBox.innerHTML = "Kattedthoru moha sothaneeee 😌❤️🫵🏻";
      switchSet(2);
    }
    else if(t >= 9){
      lineBox.innerHTML = "Love uhhh mwaaahhh 😌💋💗";
      switchSet(3);
    }

  };

}

</script>

</body>
</html>
